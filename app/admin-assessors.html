<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Assessors</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <aside class="admin-side-menu">
      <h3>Admin Menu</h3>
      <a class="admin-nav-link" id="projectsLink" href="#">Projects</a>
      <a class="admin-nav-link" id="metricsLink" href="#">Metrics</a>
      <a class="admin-nav-link" id="assessorsLink" href="#">Assessors</a>
    </aside>

    <main class="page">
      <header class="top">
        <h1>Admin Assessors</h1>
        <p id="countLabel">0 assessors</p>
      </header>

      <section class="panel">
        <div class="admin-controls">
          <input id="assessorSearch" class="project-search" type="search" placeholder="Search assessor..." oninput="renderRows()" />
        </div>
      </section>

      <section class="panel">
        <h2>Active Project Leads</h2>
        <div id="tableHost"></div>
      </section>
    </main>

    <script>
      const qp = new URLSearchParams(location.search);
      let key = qp.get('key') || '';
      const ADMIN_KEY_STORE = 'medcurity_admin_api_key_v1';
      let assessors = [];

      function esc(v) { return String(v || '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
      function norm(v) { return String(v || '').trim().toLowerCase(); }
      function loadStoredAdminKey() { try { return String(localStorage.getItem(ADMIN_KEY_STORE) || '').trim(); } catch (_) { return ''; } }
      function saveStoredAdminKey(value) { try { localStorage.setItem(ADMIN_KEY_STORE, String(value || '').trim()); } catch (_) {} }
      function clearStoredAdminKey() { try { localStorage.removeItem(ADMIN_KEY_STORE); } catch (_) {} }
      function syncKeyInUrl() {
        if (!key) return;
        const url = new URL(location.href);
        if (url.searchParams.get('key') === key) return;
        url.searchParams.set('key', key);
        history.replaceState(null, '', url.toString());
      }

      function renderRows() {
        const q = norm((document.getElementById('assessorSearch') || {}).value || '');
        const filtered = assessors.filter((a) => norm(a.name).includes(q));
        document.getElementById('countLabel').textContent = `${filtered.length} assessors`;
        if (!filtered.length) {
          document.getElementById('tableHost').innerHTML = '<p class="admin-empty">No assessors found.</p>';
          return;
        }
        const rows = filtered.map((a) => `<tr>
          <td><a href="${a.relative_url}">${esc(a.name)}</a></td>
          <td>${esc(a.active_project_count)}</td>
          <td><a href="${a.relative_url}" target="_blank" rel="noreferrer">Open</a></td>
        </tr>`).join('');
        document.getElementById('tableHost').innerHTML = `
          <table class="admin-table">
            <thead>
              <tr>
                <th>Assessor</th>
                <th>Active Projects</th>
                <th>Dashboard</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      async function init() {
        if (!key) key = loadStoredAdminKey();
        if (key) {
          saveStoredAdminKey(key);
          syncKeyInUrl();
        }
        const keyQ = key ? `?key=${encodeURIComponent(key)}` : '';
        document.getElementById('projectsLink').href = `/admin/projects${keyQ}`;
        document.getElementById('metricsLink').href = `/admin/metrics${keyQ}`;
        document.getElementById('assessorsLink').href = `/admin/assessors${keyQ}`;

        const apiUrl = key ? `/api/assessors?key=${encodeURIComponent(key)}` : '/api/assessors';
        let res = await fetch(apiUrl);
        if (res.status === 401) {
          const entered = String(window.prompt('Enter admin key to continue:', '') || '').trim();
          if (!entered) throw new Error('Unauthorized');
          key = entered;
          saveStoredAdminKey(key);
          syncKeyInUrl();
          res = await fetch(`/api/assessors?key=${encodeURIComponent(key)}`);
          if (res.status === 401) {
            clearStoredAdminKey();
            throw new Error('Unauthorized');
          }
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || data.error || `Load failed (${res.status})`);
        assessors = Array.isArray(data.assessors) ? data.assessors : [];
        renderRows();
      }

      init().catch((err) => {
        document.body.innerHTML = `<main class="page"><section class="panel"><h2>Load failed</h2><p>${esc(err.message || err)}</p></section></main>`;
      });
    </script>
  </body>
</html>
